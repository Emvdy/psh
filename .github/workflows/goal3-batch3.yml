name: Goal 3 Batch 3

on:
  push:
    branches:
      - main
      - 'goal3/**'
  pull_request:

permissions:
  contents: read

jobs:
  windows-powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Batch 3 validation and regressions
        shell: powershell
        env:
          REPORT_ROOT: ${{ runner.temp }}/goal3-batch3-report-winps51
        run: |
          $ErrorActionPreference = 'Stop'
          [void](New-Item -ItemType Directory -Path $env:REPORT_ROOT -Force)
          $transcriptPath = Join-Path $env:REPORT_ROOT 'validation-transcript.txt'
          Start-Transcript -Path $transcriptPath -Force
          try {
              $PSVersionTable | Out-String | Write-Output
              if ($PSVersionTable.PSVersion.Major -ne 5 -or $PSVersionTable.PSVersion.Minor -ne 1) {
                  throw 'The Windows PowerShell job must run PowerShell 5.1.'
              }

              ./scripts/Generate-CommandArtifacts.ps1 -Check
              ./tests/Goal1.Acceptance.ps1
              ./scripts/Test-InteractiveDependencies.ps1
              ./tests/Goal2.Acceptance.ps1
              ./tests/Goal3.Batch1.Config.ps1
              ./tests/Goal3.Batch1.AliasScope.ps1
              ./tests/Goal3.Batch1.FileCommands.ps1
              ./tests/Goal3.Batch2.TextCommands.ps1
              ./tests/Goal3.Batch3.ComplexCommands.ps1
              $global:LASTEXITCODE = 0
          }
          finally {
              Stop-Transcript
          }

      - name: Upload Windows PowerShell report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: goal3-batch3-report-winps51
          path: ${{ runner.temp }}/goal3-batch3-report-winps51
          if-no-files-found: warn
          retention-days: 30

  powershell:
    name: PowerShell 7
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Batch 3 validation and regressions
        shell: pwsh
        env:
          REPORT_ROOT: ${{ runner.temp }}/goal3-batch3-report-pwsh7
        run: |
          $ErrorActionPreference = 'Stop'
          [void](New-Item -ItemType Directory -Path $env:REPORT_ROOT -Force)
          $transcriptPath = Join-Path $env:REPORT_ROOT 'validation-transcript.txt'
          Start-Transcript -Path $transcriptPath -Force
          try {
              $PSVersionTable | Out-String | Write-Output
              if ($PSVersionTable.PSVersion.Major -lt 7) {
                  throw 'The PowerShell job must run PowerShell 7 or later.'
              }

              ./scripts/Generate-CommandArtifacts.ps1 -Check
              ./tests/Goal1.Acceptance.ps1
              ./scripts/Test-InteractiveDependencies.ps1
              ./tests/Goal2.Acceptance.ps1
              ./tests/Goal3.Batch1.Config.ps1
              ./tests/Goal3.Batch1.AliasScope.ps1
              ./tests/Goal3.Batch1.FileCommands.ps1
              ./tests/Goal3.Batch2.TextCommands.ps1
              ./tests/Goal3.Batch3.ComplexCommands.ps1
              $global:LASTEXITCODE = 0
          }
          finally {
              Stop-Transcript
          }

      - name: Upload PowerShell report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: goal3-batch3-report-pwsh7
          path: ${{ runner.temp }}/goal3-batch3-report-pwsh7
          if-no-files-found: warn
          retention-days: 30
