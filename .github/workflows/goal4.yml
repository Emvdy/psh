          Start-Transcript -Path $transcriptPath -Force
          try {
              $PSVersionTable | Out-String | Write-Output
              if ($PSVersionTable.PSVersion.Major -lt 7) {
                  throw 'The PowerShell job must run PowerShell 7 or later.'
              }

              ./scripts/Generate-CommandArtifacts.ps1 -Check
              ./scripts/Generate-SupplyChainArtifacts.ps1 -Check
              ./scripts/Test-NativeTools.ps1 -Architecture all
              ./tests/Goal4.Acceptance.ps1
              ./tests/Goal1.Acceptance.ps1
              ./scripts/Test-InteractiveDependencies.ps1
              ./tests/Goal2.Acceptance.ps1
              ./tests/Goal3.Batch1.Config.ps1
              ./tests/Goal3.Batch1.AliasScope.ps1
              ./tests/Goal3.Batch1.FileCommands.ps1
              ./tests/Goal3.Batch2.TextCommands.ps1
              ./tests/Goal3.Batch3.ComplexCommands.ps1
              ./tests/Goal3.Batch4.SystemProcessCommands.ps1
              ./tests/Goal3.Batch4.NetworkCommands.ps1
