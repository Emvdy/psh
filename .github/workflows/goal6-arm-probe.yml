name: Goal 6 Windows 11 ARM Capability Probe

on:
  workflow_dispatch:
  push:
    branches:
      - goal6/tests-ci
    paths:
      - '.github/workflows/goal6-arm-probe.yml'

permissions: {}

jobs:
  windows-arm-capability:
    name: Windows 11 ARM capability
    runs-on: windows-11-arm
    timeout-minutes: 10

    steps:
      - name: Initialize probe and locate shells
        id: initialize
        shell: pwsh
        env:
          PSH_ARM_REPORT_ROOT: ${{ runner.temp }}\goal6-arm-probe
          PSH_RUNNER_ARCH_CONTEXT: ${{ runner.arch }}
        run: |
          $ErrorActionPreference = 'Stop'
          [void](New-Item -ItemType Directory -Path $env:PSH_ARM_REPORT_ROOT -Force)

          function Write-PshArmJson {
              param(
                  [Parameter(Mandatory = $true)]
                  [string]$Path,

                  [Parameter(Mandatory = $true)]
                  [object]$Value
              )

              $utf8 = [Text.UTF8Encoding]::new($false, $true)
              [IO.File]::WriteAllText($Path, (($Value | ConvertTo-Json -Depth 10) + "`n"), $utf8)
          }

          function Get-PshArmCommandPath {
              param([object]$Command)

              if ($null -eq $Command) {
                  return $null
              }
              foreach ($propertyName in @('Path', 'Source', 'Definition')) {
                  $property = $Command.PSObject.Properties[$propertyName]
                  if ($null -ne $property -and -not [string]::IsNullOrWhiteSpace([string]$property.Value)) {
                      return [string]$property.Value
                  }
              }
              return $null
          }

          $pwshCommand = Get-Command -Name 'pwsh.exe' -CommandType Application -ErrorAction SilentlyContinue |
              Select-Object -First 1
          $windowsPowerShellCommand = Get-Command -Name 'powershell.exe' -CommandType Application -ErrorAction SilentlyContinue |
              Select-Object -First 1
          $pwshPath = Get-PshArmCommandPath -Command $pwshCommand
          $windowsPowerShellPath = Get-PshArmCommandPath -Command $windowsPowerShellCommand
          $hasWindowsPowerShell = $null -ne $windowsPowerShellCommand

          $context = [ordered]@{
              schemaVersion = 1
              requestedRunnerLabel = 'windows-11-arm'
              runner = [ordered]@{
                  archContext = $env:PSH_RUNNER_ARCH_CONTEXT
                  imageOS = $env:ImageOS
                  imageVersion = $env:ImageVersion
              }
              shells = [ordered]@{
                  pwshPath = $pwshPath
                  windowsPowerShellPresent = $hasWindowsPowerShell
                  windowsPowerShellPath = $windowsPowerShellPath
              }
          }
          Write-PshArmJson -Path (Join-Path $env:PSH_ARM_REPORT_ROOT 'probe-context.json') -Value $context

          "has_windows_powershell=$($hasWindowsPowerShell.ToString().ToLowerInvariant())" |
              Out-File -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($hasWindowsPowerShell) {
              "windows_powershell_path=$windowsPowerShellPath" |
                  Out-File -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Probe required PowerShell 7 ARM64 capability
        id: ps7
        shell: pwsh
        env:
          PSH_ARM_REPORT_ROOT: ${{ runner.temp }}\goal6-arm-probe
          PSH_RUNNER_ARCH_CONTEXT: ${{ runner.arch }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Write-PshArmJson {
              param(
                  [Parameter(Mandatory = $true)]
                  [string]$Path,

                  [Parameter(Mandatory = $true)]
                  [object]$Value
              )

              $utf8 = [Text.UTF8Encoding]::new($false, $true)
              [IO.File]::WriteAllText($Path, (($Value | ConvertTo-Json -Depth 10) + "`n"), $utf8)
          }

          function Get-PshArmModuleRecord {
              param([string]$Name)

              $module = Get-Module -ListAvailable -Name $Name |
                  Sort-Object -Property Version -Descending |
                  Select-Object -First 1
              if ($null -eq $module) {
                  return $null
              }
              return [ordered]@{
                  name = [string]$module.Name
                  version = $module.Version.ToString()
                  moduleBase = [string]$module.ModuleBase
                  path = [string]$module.Path
              }
          }

          $runtimeOSArchitecture = [Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString()
          $runtimeProcessArchitecture = [Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture.ToString()
          $operatingSystem = Get-CimInstance -ClassName Win32_OperatingSystem
          $processor = Get-CimInstance -ClassName Win32_Processor | Select-Object -First 1
          $currentProcess = Get-Process -Id $PID
          $pwshCommand = Get-Command -Name 'pwsh.exe' -CommandType Application -ErrorAction SilentlyContinue |
              Select-Object -First 1
          $windowsPowerShellCommand = Get-Command -Name 'powershell.exe' -CommandType Application -ErrorAction SilentlyContinue |
              Select-Object -First 1
          $pester = Get-PshArmModuleRecord -Name 'Pester'
          $psScriptAnalyzer = Get-PshArmModuleRecord -Name 'PSScriptAnalyzer'

          $gates = [ordered]@{
              runnerArchArm64 = $env:PSH_RUNNER_ARCH_CONTEXT -ceq 'ARM64'
              runtimeOSArchitectureArm64 = $runtimeOSArchitecture -ceq 'Arm64'
              runtimeProcessArchitectureArm64 = $runtimeProcessArchitecture -ceq 'Arm64'
              powershellCore = $PSVersionTable.PSEdition -ceq 'Core'
              powershellVersionAtLeast7 = $PSVersionTable.PSVersion.Major -ge 7
              pesterAvailable = $null -ne $pester
              psScriptAnalyzerAvailable = $null -ne $psScriptAnalyzer
          }
          $failureReasons = [Collections.Generic.List[string]]::new()
          foreach ($gate in $gates.GetEnumerator()) {
              if (-not [bool]$gate.Value) {
                  $failureReasons.Add([string]$gate.Key)
              }
          }

          $report = [ordered]@{
              schemaVersion = 1
              required = $true
              runner = [ordered]@{
                  requestedLabel = 'windows-11-arm'
                  archContext = $env:PSH_RUNNER_ARCH_CONTEXT
                  imageOS = $env:ImageOS
                  imageVersion = $env:ImageVersion
              }
              powershell = [ordered]@{
                  edition = [string]$PSVersionTable.PSEdition
                  version = $PSVersionTable.PSVersion.ToString()
                  processPath = [string]$currentProcess.Path
                  psHome = [string]$PSHOME
                  commandPath = if ($null -eq $pwshCommand) { $null } else { [string]$pwshCommand.Source }
              }
              runtime = [ordered]@{
                  osArchitecture = $runtimeOSArchitecture
                  processArchitecture = $runtimeProcessArchitecture
                  osDescription = [Runtime.InteropServices.RuntimeInformation]::OSDescription
                  frameworkDescription = [Runtime.InteropServices.RuntimeInformation]::FrameworkDescription
              }
              cim = [ordered]@{
                  operatingSystemCaption = [string]$operatingSystem.Caption
                  operatingSystemVersion = [string]$operatingSystem.Version
                  operatingSystemArchitecture = [string]$operatingSystem.OSArchitecture
                  processorName = [string]$processor.Name
                  processorArchitectureCode = [int]$processor.Architecture
                  processorAddressWidth = [int]$processor.AddressWidth
                  processorDataWidth = [int]$processor.DataWidth
              }
              environment = [ordered]@{
                  processorArchitecture = $env:PROCESSOR_ARCHITECTURE
                  processorArchitectureW6432 = $env:PROCESSOR_ARCHITEW6432
                  windowsPowerShellPath = if ($null -eq $windowsPowerShellCommand) { $null } else { [string]$windowsPowerShellCommand.Source }
              }
              modules = [ordered]@{
                  pester = $pester
                  psScriptAnalyzer = $psScriptAnalyzer
              }
              gates = $gates
              failureReasons = @($failureReasons)
              passed = $failureReasons.Count -eq 0
          }
          Write-PshArmJson -Path (Join-Path $env:PSH_ARM_REPORT_ROOT 'ps7-capability.json') -Value $report

          if ($failureReasons.Count -gt 0) {
              throw ('Required Windows ARM64/PowerShell 7 capability gates failed: {0}' -f ($failureReasons -join ', '))
          }

      - name: Probe optional Windows PowerShell 5.1 capability
        id: ps51
        if: ${{ always() && steps.initialize.outputs.has_windows_powershell == 'true' }}
        continue-on-error: true
        shell: powershell
        env:
          PSH_ARM_REPORT_ROOT: ${{ runner.temp }}\goal6-arm-probe
          PSH_RUNNER_ARCH_CONTEXT: ${{ runner.arch }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Write-PshArmJson {
              param(
                  [Parameter(Mandatory = $true)]
                  [string]$Path,

                  [Parameter(Mandatory = $true)]
                  [object]$Value
              )

              $utf8 = New-Object System.Text.UTF8Encoding -ArgumentList @($false, $true)
              [IO.File]::WriteAllText($Path, (($Value | ConvertTo-Json -Depth 10) + "`n"), $utf8)
          }

          $architectureSource = 'RuntimeInformation'
          try {
              $processArchitecture = [Runtime.InteropServices.RuntimeInformation]::ProcessArchitecture.ToString()
              $osArchitecture = [Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString()
          }
          catch {
              $architectureSource = 'EnvironmentFallback'
              $processArchitecture = switch ([string]$env:PROCESSOR_ARCHITECTURE) {
                  'AMD64' { 'X64'; break }
                  'ARM64' { 'Arm64'; break }
                  'x86' { 'X86'; break }
                  default { [string]$env:PROCESSOR_ARCHITECTURE }
              }
              $osArchitecture = if ($env:PROCESSOR_ARCHITEW6432 -ieq 'ARM64' -or $env:PSH_RUNNER_ARCH_CONTEXT -ceq 'ARM64') {
                  'Arm64'
              }
              else {
                  $processArchitecture
              }
          }

          $currentProcess = Get-Process -Id $PID
          $isDesktop51 = $PSVersionTable.PSEdition -ceq 'Desktop' -and
              $PSVersionTable.PSVersion.Major -eq 5 -and
              $PSVersionTable.PSVersion.Minor -eq 1
          $isNativeArm64 = $isDesktop51 -and $processArchitecture -ceq 'Arm64'
          $isX64EmulationOnly = $isDesktop51 -and
              $processArchitecture -ceq 'X64' -and
              $env:PSH_RUNNER_ARCH_CONTEXT -ceq 'ARM64'

          $report = [ordered]@{
              schemaVersion = 1
              required = $false
              available = $isDesktop51
              desktop51 = $isDesktop51
              nativeArm64 = $isNativeArm64
              x64EmulationOnly = $isX64EmulationOnly
              powershell = [ordered]@{
                  edition = [string]$PSVersionTable.PSEdition
                  version = $PSVersionTable.PSVersion.ToString()
                  processPath = [string]$currentProcess.Path
                  psHome = [string]$PSHOME
              }
              runtime = [ordered]@{
                  osArchitecture = $osArchitecture
                  processArchitecture = $processArchitecture
                  architectureSource = $architectureSource
              }
              environment = [ordered]@{
                  runnerArchContext = $env:PSH_RUNNER_ARCH_CONTEXT
                  processorArchitecture = $env:PROCESSOR_ARCHITECTURE
                  processorArchitectureW6432 = $env:PROCESSOR_ARCHITEW6432
              }
              classification = if (-not $isDesktop51) {
                  'not-windows-powershell-5.1'
              }
              elseif ($isNativeArm64) {
                  'native-arm64'
              }
              elseif ($isX64EmulationOnly) {
                  'x64-emulation-only'
              }
              else {
                  'other'
              }
          }
          Write-PshArmJson -Path (Join-Path $env:PSH_ARM_REPORT_ROOT 'ps51-capability.json') -Value $report

      - name: Write machine-readable report and summary
        if: ${{ always() }}
        shell: pwsh
        env:
          PSH_ARM_REPORT_ROOT: ${{ runner.temp }}\goal6-arm-probe
          PSH_RUNNER_ARCH_CONTEXT: ${{ runner.arch }}
          PSH_PS7_STEP_OUTCOME: ${{ steps.ps7.outcome }}
          PSH_PS7_STEP_CONCLUSION: ${{ steps.ps7.conclusion }}
          PSH_PS51_STEP_OUTCOME: ${{ steps.ps51.outcome }}
          PSH_PS51_STEP_CONCLUSION: ${{ steps.ps51.conclusion }}
          PSH_HAS_WINDOWS_POWERSHELL: ${{ steps.initialize.outputs.has_windows_powershell }}
        run: |
          $ErrorActionPreference = 'Stop'
          [void](New-Item -ItemType Directory -Path $env:PSH_ARM_REPORT_ROOT -Force)

          function Read-PshArmJson {
              param([string]$Path)

              if (-not (Test-Path -LiteralPath $Path -PathType Leaf)) {
                  return $null
              }
              return Get-Content -LiteralPath $Path -Raw -Encoding UTF8 | ConvertFrom-Json
          }

          function Write-PshArmJson {
              param(
                  [Parameter(Mandatory = $true)]
                  [string]$Path,

                  [Parameter(Mandatory = $true)]
                  [object]$Value
              )

              $utf8 = [Text.UTF8Encoding]::new($false, $true)
              [IO.File]::WriteAllText($Path, (($Value | ConvertTo-Json -Depth 12) + "`n"), $utf8)
          }

          $context = Read-PshArmJson -Path (Join-Path $env:PSH_ARM_REPORT_ROOT 'probe-context.json')
          $ps7 = Read-PshArmJson -Path (Join-Path $env:PSH_ARM_REPORT_ROOT 'ps7-capability.json')
          $ps51 = Read-PshArmJson -Path (Join-Path $env:PSH_ARM_REPORT_ROOT 'ps51-capability.json')
          $windowsPowerShellLocated = $env:PSH_HAS_WINDOWS_POWERSHELL -ceq 'true'

          if ($null -eq $context) {
              $context = [ordered]@{
                  requestedRunnerLabel = 'windows-11-arm'
                  runner = [ordered]@{
                      archContext = $env:PSH_RUNNER_ARCH_CONTEXT
                      imageOS = $env:ImageOS
                      imageVersion = $env:ImageVersion
                  }
              }
          }
          if ($null -eq $ps7) {
              $ps7 = [ordered]@{
                  required = $true
                  passed = $false
                  failureReasons = @('ps7-capability-report-missing')
              }
          }
          if ($null -eq $ps51) {
              $ps51 = [ordered]@{
                  required = $false
                  available = $false
                  located = $windowsPowerShellLocated
                  classification = if ($windowsPowerShellLocated) { 'probe-failed' } else { 'unavailable' }
              }
          }

          $requiredPassed = $env:PSH_PS7_STEP_OUTCOME -ceq 'success'
          $report = [ordered]@{
              schemaVersion = 1
              probe = 'goal6-windows-11-arm-capability'
              generatedAtUtc = [DateTime]::UtcNow.ToString('o')
              context = $context
              requiredPowerShell7 = $ps7
              optionalWindowsPowerShell51 = $ps51
              steps = [ordered]@{
                  powershell7 = [ordered]@{
                      outcome = $env:PSH_PS7_STEP_OUTCOME
                      conclusion = $env:PSH_PS7_STEP_CONCLUSION
                  }
                  windowsPowerShell51 = [ordered]@{
                      outcome = $env:PSH_PS51_STEP_OUTCOME
                      conclusion = $env:PSH_PS51_STEP_CONCLUSION
                  }
              }
              result = [ordered]@{
                  requiredPassed = $requiredPassed
                  ps51Required = $false
                  ps51UnavailabilityFailsProbe = $false
              }
          }
          Write-PshArmJson -Path (Join-Path $env:PSH_ARM_REPORT_ROOT 'goal6-arm-capability-report.json') -Value $report

          $ps51Classification = [string]$ps51.classification
          $summary = @(
              '# Goal 6 Windows 11 ARM capability probe'
              ''
              '| Field | Value |'
              '| --- | --- |'
              "| Requested runner | windows-11-arm |"
              "| runner.arch | $($context.runner.archContext) |"
              "| ImageOS | $($context.runner.imageOS) |"
              "| ImageVersion | $($context.runner.imageVersion) |"
              "| Required PS7 ARM64 gate | $requiredPassed |"
              "| PS7 step outcome | $($env:PSH_PS7_STEP_OUTCOME) |"
              "| Windows PowerShell 5.1 | $ps51Classification |"
              "| PS5.1 step outcome | $($env:PSH_PS51_STEP_OUTCOME) |"
              ''
              'Windows PowerShell 5.1 is optional. An X64 process is recorded as emulation only and does not establish native ARM64 support.'
          )
          $summary | Out-File -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Ensure fallback JSON report
        if: ${{ always() }}
        shell: cmd
        env:
          PSH_ARM_REPORT_ROOT: ${{ runner.temp }}\goal6-arm-probe
        run: |
          if not exist "%PSH_ARM_REPORT_ROOT%" mkdir "%PSH_ARM_REPORT_ROOT%"
          if not exist "%PSH_ARM_REPORT_ROOT%\goal6-arm-capability-report.json" >"%PSH_ARM_REPORT_ROOT%\goal6-arm-capability-report.json" echo {"schemaVersion":1,"probe":"goal6-windows-11-arm-capability","fallback":true,"result":{"requiredPassed":false,"ps51Required":false,"ps51UnavailabilityFailsProbe":false}}

      - name: Upload ARM capability report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: goal6-windows-11-arm-capability
          path: ${{ runner.temp }}\goal6-arm-probe
          if-no-files-found: error
          retention-days: 30
