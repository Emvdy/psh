name: Core validation

on:
  push:
    branches:
      - main
      - 'goal1/**'
      - 'goal2/**'
  pull_request:

permissions:
  contents: read

jobs:
  windows-powershell:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Report runtime
        shell: powershell
        run: |
          $PSVersionTable | Out-String | Write-Output
          if ($PSVersionTable.PSVersion.Major -ne 5 -or $PSVersionTable.PSVersion.Minor -ne 1) {
              throw 'The Windows PowerShell job must run PowerShell 5.1.'
          }

      - name: Check generated artifacts
        shell: powershell
        run: ./scripts/Generate-CommandArtifacts.ps1 -Check

      - name: Run Goal 1 acceptance
        shell: powershell
        run: ./tests/Goal1.Acceptance.ps1

      - name: Verify interactive dependencies
        shell: powershell
        run: ./scripts/Test-InteractiveDependencies.ps1

      - name: Run Goal 2 acceptance
        shell: powershell
        run: ./tests/Goal2.Acceptance.ps1

  powershell:
    name: PowerShell 7
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Report runtime
        shell: pwsh
        run: |
          $PSVersionTable | Out-String | Write-Output
          if ($PSVersionTable.PSVersion.Major -lt 7) {
              throw 'The PowerShell job must run PowerShell 7 or later.'
          }

      - name: Check generated artifacts
        shell: pwsh
        run: ./scripts/Generate-CommandArtifacts.ps1 -Check

      - name: Run Goal 1 acceptance
        shell: pwsh
        run: ./tests/Goal1.Acceptance.ps1

      - name: Verify interactive dependencies
        shell: pwsh
        run: ./scripts/Test-InteractiveDependencies.ps1

      - name: Run Goal 2 acceptance
        shell: pwsh
        run: ./tests/Goal2.Acceptance.ps1
